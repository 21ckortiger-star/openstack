<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE 02 | Space Two</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .project-wrap {
      padding: 84px 0 64px;
    }

    .project-hero {
      border: 1px solid var(--line);
      border-radius: 18px;
      min-height: 430px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, rgba(4, 10, 24, 0.82), rgba(9, 26, 54, 0.68));
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      opacity: 0.76;
    }

    .hero-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-grid .main {
      grid-row: 1 / 3;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 70% 25%, rgba(148, 213, 255, 0.28), transparent 35%),
        radial-gradient(circle at 40% 70%, rgba(100, 143, 255, 0.23), transparent 45%),
        linear-gradient(170deg, rgba(2, 7, 18, 0.45), rgba(8, 24, 52, 0.55));
    }

    .hero-title {
      position: absolute;
      right: 6%;
      bottom: 10%;
      z-index: 2;
      text-align: right;
    }

    .hero-title h2 {
      margin: 0;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
    }

    .hero-title p {
      margin: 6px 0 0;
      color: #c9ddf7;
      font-size: .95rem;
    }

    .project-body {
      margin-top: 28px;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .space-gallery {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .space-gallery img {
      width: 100%;
      height: 116px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      opacity: 0.92;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container nav">
      <div class="logo">goonggeum</div>
      <nav>
        <a href="/">Home</a>
        <a href="/#projects">Projects</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="project-wrap">
    <section class="container">
      <div class="project-hero">
        <div class="hero-grid">
          <img class="main" src="/images/space/space_2-1.jpg" alt="space two 1" />
          <img src="/images/space/space_2-2.jpg" alt="space two 2" />
          <img src="/images/space/space_2-3.jpg" alt="space two 3" />
          <img src="/images/space/space_2-4.jpg" alt="space two 4" />
          <img src="/images/space/space_2-2.jpg" alt="space two extra" />
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-title">
          <h2>Space Two View</h2>
          <p>다른 시선에서 바라보는 우주</p>
        </div>
      </div>

      <div class="project-body">
        <h1></h1>
        <p class="meta">Theme: Deep Blue Space · 이미지 4장 적용</p>
        <p class="sub">두 번째 테마는 우주에서 지구를 바라보는 시선에 집중합니다. 거리감, 빛, 고요함을 이미지 중심으로 구성했습니다.</p>

        <div class="space-gallery">
          <img src="/images/space/space_2-1.jpg" alt="space2 gallery 1" />
          <img src="/images/space/space_2-2.jpg" alt="space2 gallery 2" />
          <img src="/images/space/space_2-3.jpg" alt="space2 gallery 3" />
          <img src="/images/space/space_2-4.jpg" alt="space2 gallery 4" />
        </div>

        <div class="cta-wrap">
          <a class="btn primary" href="/">홈으로</a>
          <a class="btn" href="/#projects">다른 프로젝트 보기</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> kortiger. All rights reserved.</div>
  </footer>

  <script src="/js/main.js"></script>
</body>

</html>
