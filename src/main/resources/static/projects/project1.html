<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE 01 | Space One</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .project-wrap {
      padding: 84px 0 64px;
    }

    .project-hero {
      border: 1px solid var(--line);
      border-radius: 18px;
      min-height: 420px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(94, 172, 255, 0.18);
      isolation: isolate;
      background: linear-gradient(160deg, rgba(3, 10, 28, 0.72), rgba(10, 34, 74, 0.58));
    }

    .hero-collage {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      opacity: 0.72;
      z-index: 0;
    }

    .hero-collage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.02);
    }

    .hero-collage .main {
      grid-row: 1 / 3;
    }

    .project-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 8% 20%, rgba(255, 255, 255, 0.95), transparent),
        radial-gradient(1.5px 1.5px at 24% 60%, rgba(236, 246, 255, 0.9), transparent),
        radial-gradient(2px 2px at 45% 30%, rgba(255, 255, 255, 0.85), transparent),
        radial-gradient(1px 1px at 59% 80%, rgba(233, 245, 255, 0.9), transparent),
        radial-gradient(2px 2px at 76% 42%, rgba(255, 255, 255, 0.92), transparent),
        radial-gradient(1px 1px at 90% 18%, rgba(230, 245, 255, 0.85), transparent),
        radial-gradient(1px 1px at 34% 14%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 70% 84%, rgba(220, 238, 255, 0.7), transparent),
        radial-gradient(1px 1px at 51% 52%, rgba(245, 251, 255, 0.75), transparent);
      opacity: 0.92;
      z-index: 1;
    }

    .nebula {
      position: absolute;
      inset: -20% -20% auto auto;
      width: 84%;
      height: 98%;
      background:
        radial-gradient(ellipse at 42% 44%, rgba(130, 202, 255, 0.48), rgba(120, 180, 255, 0.20) 36%, rgba(130, 202, 255, 0) 66%);
      filter: blur(24px);
      transform: rotate(-12deg);
      z-index: 0;
    }

    .nebula-band {
      position: absolute;
      left: -14%;
      right: -14%;
      top: 40%;
      height: 150px;
      background:
        linear-gradient(90deg, rgba(105, 179, 255, 0.02), rgba(165, 223, 255, 0.30), rgba(124, 180, 255, 0.22), rgba(96, 154, 242, 0.03));
      filter: blur(18px);
      transform: rotate(-10deg);
      z-index: 2;
      opacity: 0.95;
    }

    .milkyway-core {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 46%;
      height: 72px;
      background: linear-gradient(90deg, rgba(170, 220, 255, 0), rgba(205, 236, 255, 0.48), rgba(180, 222, 255, 0));
      filter: blur(10px);
      transform: rotate(-10deg);
      z-index: 3;
      opacity: 0.9;
    }

    .moon {
      position: absolute;
      left: 12%;
      top: 20%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 26%, rgba(235, 246, 255, 0.9), rgba(132, 174, 214, 0.6) 56%, rgba(42, 74, 120, 0.7) 86%);
      box-shadow: 0 0 10px rgba(140, 200, 255, 0.18);
      z-index: 3;
      opacity: 0.45;
    }

    .comet {
      position: absolute;
      width: 120px;
      height: 24px;
      background: radial-gradient(circle at 80% 50%, rgba(255, 255, 255, 0.95), rgba(195, 230, 255, 0.8) 26%, rgba(195, 230, 255, 0) 60%);
      filter: blur(0.2px) drop-shadow(0 0 8px rgba(196, 232, 255, 0.7));
      z-index: 4;
      opacity: 0;
    }

    .comet::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 92px;
      height: 2px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(208, 238, 255, 0.75));
      border-radius: 999px;
    }

    .comet.one {
      right: 12%;
      top: 18%;
      transform: rotate(-16deg);
      /* animation: cometMove1 6.2s ease-in-out infinite; */
    }

    .comet.two {
      right: 22%;
      top: 28%;
      transform: rotate(-10deg) scale(0.82);
      /* animation: cometMove2 7.1s ease-in-out infinite 1.6s; */
    }

    .hero-title {
      position: absolute;
      right: 6%;
      bottom: 10%;
      z-index: 4;
      text-align: right;
    }

    .hero-title h2 {
      margin: 0;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.02em;
    }

    .hero-title p {
      margin: 6px 0 0;
      color: #c9ddf7;
      font-size: 0.95rem;
    }

    @keyframes cometMove1 {
      0% {
        transform: translate(120px, -40px) rotate(-16deg);
        opacity: 0;
      }

      12% {
        opacity: 0.9;
      }

      40% {
        transform: translate(-120px, 64px) rotate(-16deg);
        opacity: 0.9;
      }

      58% {
        opacity: 0;
      }

      100% {
        transform: translate(-180px, 96px) rotate(-16deg);
        opacity: 0;
      }
    }

    @keyframes cometMove2 {
      0% {
        transform: translate(100px, -30px) rotate(-10deg) scale(0.82);
        opacity: 0;
      }

      18% {
        opacity: 0.75;
      }

      48% {
        transform: translate(-100px, 55px) rotate(-10deg) scale(0.82);
        opacity: 0.75;
      }

      66% {
        opacity: 0;
      }

      100% {
        transform: translate(-160px, 82px) rotate(-10deg) scale(0.82);
        opacity: 0;
      }
    }

    .project-body {
      margin-top: 28px;
    }

    .project-body h1 {
      margin: 0 0 10px;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .space-gallery {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .space-gallery img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container nav">
      <div class="logo">goonggeum</div>
      <nav>
        <a href="/">Home</a>
        <a href="/#projects">Projects</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="project-wrap">
    <section class="container">
      <div class="project-hero">
        <div class="hero-collage">
          <img class="main" src="/images/space/space_1-1.jpg" alt="우주 이미지 1" />
          <img src="/images/space/space_1-2.jpg" alt="우주 이미지 2" />
          <img src="/images/space/space_1-3.jpg" alt="우주 이미지 3" />
        </div>
        <div class="nebula"></div>
        <div class="nebula-band"></div>
        <div class="milkyway-core"></div>
        <div class="moon"></div>
        <div class="comet one"></div>
        <div class="comet two"></div>
        <div class="hero-title">
          <h2>Blue Nebula View</h2>
          <p>푸른 성운과 별무리를 바라보는 시선</p>
        </div>
      </div>

      <div class="project-body">
        <h1></h1>
        <p class="meta">Theme: 푸른 성운 + 별무리 · 이미지 3장 적용</p>
        <p class="sub">
          첫 테마는 우주를 마주하는 감정을 담았습니다.
          현실과 상상을 반쯤 섞은 푸른 성운 톤으로,
          고요하지만 살아있는 별무리의 분위기를 전달합니다.
        </p>

        <div class="space-gallery">
          <img src="/images/space/space_1-1.jpg" alt="푸른 성운 배경 1" />
          <img src="/images/space/space_1-2.jpg" alt="푸른 성운 배경 2" />
          <img src="/images/space/space_1-3.jpg" alt="푸른 성운 배경 3" />
        </div>

        <div class="cta-wrap">
          <a class="btn primary" href="/">홈으로</a>
          <a class="btn" href="/#projects">다른 프로젝트 보기</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> kortiger. All rights reserved.</div>
  </footer>

  <script src="/js/main.js"></script>
</body>

</html>
