spring.datasource.url=jdbc:mysql://localhost:3308/lms?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=abcde
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Start-up DB validation (fail fast)
spring.datasource.hikari.initializationFailTimeout=1
spring.datasource.hikari.connectionTimeout=5000

# Optional: avoid running schema/data SQL during this phase
spring.sql.init.mode=always

# Dev productivity: reflect template/static changes quickly
spring.thymeleaf.cache=false
spring.web.resources.chain.cache=false
spring.web.resources.cache.period=0


server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


spring.web.resources.static-locations=file:src/main/resources/static/
spring.devtools.restart.additional-paths=src/main/resources
